
name: Build & Deploy - BOT API (Python)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/bot-api/**"
      - ".github/workflows/build-deploy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: "KID-BOT-API"
  AZURE_RESOURCE_GROUP: "KID-AI-Translator"
  PYTHON_VERSION: "3.10"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        working-directory: src/bot-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip freeze > requirements.lock.txt

      - name: Create artifact zip
        working-directory: src/bot-api
        run: |
          zip -r ../bot-api.zip . -x "*.pyc" "__pycache__/*"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure startup command
        run: |
          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --startup-file "$(cat src/bot-api/startup.txt)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: "src/bot-api.zip"

      - name: Verify health
        run: |
          # Ganti URL di bawah jika domain default kamu berbeda
          curl -fsS https://kid-bot-api-bpb9gmexb6faemew.indonesiacentral-01.azurewebsites.net/healthz || exit 1
