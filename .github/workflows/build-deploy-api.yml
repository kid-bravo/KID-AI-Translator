name: Build & Deploy - BOT API (Python)

on:
  push:
    branches: ["main"]
    paths:
      - "src/bot-api/**"
      - ".github/workflows/build-deploy-api.yml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: "KID-BOT-API"
  AZURE_RESOURCE_GROUP: "KID-AI-Translator"
  PYTHON_VERSION: "3.10"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}


      - name: Install dependencies
        run: |
          cd src/bot-api
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Create deployment zip
        run: |
          cd src/bot-api
          zip -r ../../bot-api.zip . -x "*.pyc" "__pycache__/*"


      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}


      - name: Configure startup command
        run: |
          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --startup-file "gunicorn -k uvicorn.workers.UvicornWorker app:app"


      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: bot-api.zip


      - name: Verify deployment (optional)
        run: |
          curl -f https://kid-bot-api-bpb9gmexb6faemew.indonesiacentral-01.azurewebsites.net/healthz || echo "Health check skipped"
